<!DOCTYPE html>
<html>
<head>
    <title>Apply For Election</title>
</head>
<body>

<h1>Election Application Form</h1>

{% if message %}
<p>{{ message }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <label>Name:</label>
    <input type="text" name="name">

    <br><br>

    <label>Department:</label>
    <input type="text" name="department">

    <br><br>

    <button type="submit">
        Submit Application
    </button>

</form>

</body>
</html>
