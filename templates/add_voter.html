<!DOCTYPE html>
<html>
<head>
    <title>Add Voter</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container{
            width: 420px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label{
            font-weight: bold;
            color: #444;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus{
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 5px rgba(79,172,254,0.5);
        }

        button{
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover{
            transform: scale(1.03);
            transition: 0.3s;
        }

        .message{
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Add Voter</h1>

    {% if message %}
        <div class="message">
            {{ message }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Name</label>
        <input type="text" name="name" placeholder="Enter Voter Name" required>

        <label>Enrollment No</label>
        <input type="text" name="enrollment_no" placeholder="Enter Enrollment Number" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Save Voter</button>
    </form>

</div>

</body>
</html>
