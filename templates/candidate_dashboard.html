{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Candidate Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background: #eef2f7;
        }

        .navbar-custom {
            background: #1f2937;
        }

        .card-box {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .profile-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .btn-custom {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-bottom: 10px;
        }

        .apply-btn {
            background: #16a34a;
            color: white;
        }

        .apply-btn:hover {
            background: #15803d;
        }

        .pass-btn {
            background: #2563eb;
            color: white;
        }

        .pass-btn:hover {
            background: #1d4ed8;
        }

    </style>

</head>

<body>

<!-- NAVBAR (ONLY ONE LOGOUT HERE) -->
<nav class="navbar navbar-dark navbar-custom px-3">
    <span class="navbar-brand">🧑‍⚖️ Candidate Dashboard</span>

    <a href="/logout/" class="btn btn-danger btn-sm">
        Logout
    </a>
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-4">

    <div class="card-box">

        <h2 class="title">Welcome Candidate</h2>

        <div class="profile-box">
            <h5>👤 Profile Details</h5>

            <p><b>Name:</b> Candidate Name</p>
            <p><b>Department:</b> CSE</p>
        </div>

        <a href="/apply-election/">
            <button class="btn-custom apply-btn">
                Apply for Election
            </button>
        </a>

        <a href="/change-candidate-password/">
            <button class="btn-custom pass-btn">
                Change Password
            </button>
        </a>

    </div>

</div>

</body>
</html>
