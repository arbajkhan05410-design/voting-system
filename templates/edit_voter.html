<!DOCTYPE html>
<html>
<head>
    <title>Edit Voter</title>
</head>
<body>

    <h1>Edit Voter</h1>

    <form method="POST">
        {% csrf_token %}

        <label>Name:</label>
        <input type="text" name="name" value="{{ voter.name }}">

        <br><br>

        <label>Enrollment Number:</label>
        <input type="text" name="enrollment_no" value="{{ voter.enrollment_no }}">

        <br><br>

        <button type="submit">
            Update Voter
        </button>

    </form>

</body>
</html>
