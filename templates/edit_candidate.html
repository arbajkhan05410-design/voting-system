<!DOCTYPE html>
<html>
<head>
    <title>Edit Candidate</title>
</head>
<body>

    <h1>Edit Candidate</h1>

    <form method="POST">
        {% csrf_token %}

        <label>Name:</label>
        <input type="text" name="name" value="{{ candidate.name }}">

        <br><br>

        <label>Department:</label>
        <input type="text" name="department" value="{{ candidate.department }}">

        <br><br>

        <button type="submit">
            Update Candidate
        </button>

    </form>

</body>
</html>
