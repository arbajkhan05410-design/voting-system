<!DOCTYPE html>
<html>
<head>
    <title>View Candidates</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f7fc;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            padding: 12px;
        }

        td {
            text-align: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f1f9ff;
        }

        .id {
            color: #007bff;
            font-weight: bold;
        }

        .name {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Candidate List</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
        </tr>

        {% for c in candidates %}
        <tr>
            <td class="id">{{ c.id }}</td>
            <td class="name">{{ c.name }}</td>
            <td>{{ c.department }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3">No candidates found</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
