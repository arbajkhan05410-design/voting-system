{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Voter Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: Arial, sans-serif;
        }

        .navbar-custom {
            background: #111827;
        }

        .title {
            text-align: center;
            color: white;
            font-weight: bold;
            margin: 20px 0;
        }

        .card-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* 🔥 TABLE HEADER HIGHLIGHT */
        thead tr {
            background: linear-gradient(45deg, #2563eb, #1d4ed8);
            color: white;
            font-size: 16px;
        }

        thead th {
            text-align: center;
            padding: 12px;
            border: none !important;
        }

        tbody td {
            text-align: center;
            vertical-align: middle;
        }

        tbody tr:hover {
            background: #f1f5f9;
            transition: 0.2s;
        }

        .vote-btn {
            border: none;
            padding: 7px 14px;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            background: linear-gradient(45deg, #16a34a, #22c55e);
            transition: 0.3s;
        }

        .vote-btn:hover {
            transform: scale(1.05);
        }

        .message {
            text-align: center;
            color: #22c55e;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .container-box {
            margin-top: 30px;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark navbar-custom px-3">
    <span class="navbar-brand">🗳️ Voting Portal</span>

    <a href="/logout/" class="btn btn-danger btn-sm">
        Logout
    </a>
</nav>

<h2 class="title">Choose Your Candidate</h2>

<div class="container container-box">

    <div class="card-box">

        {% if message %}
            <div class="message">
                {{ message }}
            </div>
        {% endif %}

        <div class="table-responsive">

            <table class="table table-bordered">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Candidate Name</th>
                        <th>Department</th>
                        <th>Vote</th>
                    </tr>
                </thead>

                <tbody>

                    {% for candidate in candidates %}

                    <tr>
                        <td>{{ candidate.id }}</td>
                        <td>{{ candidate.name }}</td>
                        <td>{{ candidate.department }}</td>

                        <td>
                            <form method="POST">
                                {% csrf_token %}
                                <input type="hidden" name="candidate_id" value="{{ candidate.id }}">

                                <button type="submit" class="vote-btn">
                                    Vote Now
                                </button>
                            </form>
                        </td>
                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
