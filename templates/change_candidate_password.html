<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>
</head>
<body>

<h1>Change Password</h1>

<form method="POST">

    {% csrf_token %}

    <label>Old Password:</label>
    <input type="password" name="old_password">

    <br><br>

    <label>New Password:</label>
    <input type="password" name="new_password">

    <br><br>

    <button type="submit">
        Change Password
    </button>

</form>

</body>
</html>
